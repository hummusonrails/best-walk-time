<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E1C"/>
      <stop offset="50%" stop-color="#2a2520"/>
      <stop offset="100%" stop-color="#1E1E1C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFEEC8"/>
      <stop offset="50%" stop-color="#FFF5E0"/>
      <stop offset="100%" stop-color="#FFEEC8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEEC8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFEEC8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#FFEEC8" stroke-width="0.5" fill="none">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <!-- Top glow -->
  <ellipse cx="640" cy="0" rx="500" ry="200" fill="url(#glow)"/>

  <!-- Accent lines -->
  <rect x="0" y="0" width="1280" height="2" fill="url(#accent)" opacity="0.6"/>
  <rect x="0" y="318" width="1280" height="2" fill="url(#accent)" opacity="0.3"/>

  <!-- Title -->
  <text x="640" y="120" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="48" font-weight="800" letter-spacing="-1.5" fill="#FFFFFF">
    Best Walk Time
  </text>

  <!-- Subtitle -->
  <text x="640" y="170" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="20" font-weight="400" fill="#FFF5E0">
    Real-time alert analysis for safer walks in Israel
  </text>

  <!-- Tech pills -->
  <g transform="translate(640, 220)" text-anchor="middle"
     font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace"
     font-size="13" font-weight="500">

    <!-- Next.js -->
    <rect x="-270" y="-16" width="90" height="30" rx="15" fill="#FFEEC8" fill-opacity="0.12" stroke="#FFEEC8" stroke-opacity="0.25" stroke-width="1"/>
    <text x="-225" y="5" fill="#FFEEC8">Next.js 16</text>

    <!-- TypeScript -->
    <rect x="-160" y="-16" width="100" height="30" rx="15" fill="#FFEEC8" fill-opacity="0.12" stroke="#FFEEC8" stroke-opacity="0.25" stroke-width="1"/>
    <text x="-110" y="5" fill="#FFEEC8">TypeScript</text>

    <!-- Tailwind -->
    <rect x="-40" y="-16" width="100" height="30" rx="15" fill="#FFEEC8" fill-opacity="0.12" stroke="#FFEEC8" stroke-opacity="0.25" stroke-width="1"/>
    <text x="10" y="5" fill="#FFEEC8">Tailwind v4</text>

    <!-- Recharts -->
    <rect x="80" y="-16" width="85" height="30" rx="15" fill="#FFEEC8" fill-opacity="0.12" stroke="#FFEEC8" stroke-opacity="0.25" stroke-width="1"/>
    <text x="122" y="5" fill="#FFEEC8">Recharts</text>

    <!-- PWA -->
    <rect x="185" y="-16" width="60" height="30" rx="15" fill="#FFEEC8" fill-opacity="0.12" stroke="#FFEEC8" stroke-opacity="0.25" stroke-width="1"/>
    <text x="215" y="5" fill="#FFEEC8">PWA</text>

  </g>
</svg>
